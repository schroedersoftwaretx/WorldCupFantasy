name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref so a quick succession of pushes
# doesn't pile up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke (no Docker)
    runs-on: ubuntu-latest
    # Fast gate: drives the mock feed -> mapping -> scoring data path against
    # committed fixtures, no Postgres/Docker. Mirrors what you can run locally
    # with `npm run test:smoke` even on a machine without Docker.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:smoke

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  test:
    name: Tests
    runs-on: ubuntu-latest
    # GitHub-hosted ubuntu runners ship with Docker, so the integration suite's
    # Testcontainers Postgres works out of the box — no service container or
    # INTEGRATION_DATABASE_URL needed. Each test file gets its own throwaway DB,
    # exactly as it does locally.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    # The app is force-dynamic, so `next build` only compiles — it doesn't hit
    # any real service. These placeholders just keep module-load code that reads
    # env from throwing during the build. They are NOT real credentials.
    env:
      DATABASE_URL: postgres://placeholder:placeholder@localhost:5432/placeholder
      NEXT_PUBLIC_FIREBASE_API_KEY: ci-placeholder
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci-placeholder.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-placeholder
      NEXT_PUBLIC_FIREBASE_APP_ID: ci-placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
